# All routes use OAuth2 authentication and check permissions in controllers.
# This avoids Simple OAuth v6 scope-based permission conflicts.

# ── Current User Info (with roles, store, permissions) ──
budhound_api.me:
  path: '/api/budhound/me'
  defaults:
    _controller: '\Drupal\budhound_api\Controller\UserController::me'
  requirements:
    _user_is_logged_in: 'TRUE'
  options:
    _auth: ['oauth2', 'cookie']
  methods: [GET]

