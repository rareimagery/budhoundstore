# Nginx config for budhound.app
# Installed at: /etc/nginx/sites-available/budhound.app.conf
# Symlinked to: /etc/nginx/sites-enabled/budhound.app.conf

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name budhound.app www.budhound.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name budhound.app www.budhound.app;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/budhound.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/budhound.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload size (Drupal media)
    client_max_body_size 128M;

    # Proxy to Drupal Apache container
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # Static file caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass       http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires          30d;
        add_header       Cache-Control "public, immutable";
    }
}
